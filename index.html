<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <title>FitTrack</title>
    <!--
      Le module principal est différé : sans ce script bloquant, un utilisateur en
      thème clair voit un flash noir à chaque démarrage. Doit rester synchrone et
      utiliser la même clé que src/stores/theme.ts.
    -->
    <script>
      (function () {
        var theme = localStorage.getItem('fittrack:theme') === 'light' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document
          .querySelector('meta[name="theme-color"]')
          .setAttribute('content', theme === 'light' ? '#ffffff' : '#0a0a0b');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
