<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <!--
      `interactive-widget=resizes-content` : sans lui, le clavier logiciel se pose
      PAR-DESSUS la vue sans en réduire la hauteur (comportement Android par
      défaut, `resizes-visual`). Le conteneur défilant garde alors sa pleine
      hauteur 100dvh, une liste courte ne déborde pas, et ses derniers résultats
      restent piégés derrière le clavier — impossibles à faire remonter. Reporté
      du téléphone : recherche d'exercice, on ne pouvait plus scroller la liste.
      Avec `resizes-content`, la vue mise en page rétrécit à la zone au-dessus du
      clavier, la liste déborde et redevient défilable.
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#0a0a0b" />
    <title>FitTrack</title>
    <!--
      Sans cette ligne le navigateur réclame /favicon.ico à la RACINE du domaine
      (hugo-burnet.github.io/favicon.ico, hors du base path) et prend un 404 à
      chaque chargement — du bruit qui finit par masquer les vraies erreurs.

      Dessinée en SVG inline plutôt qu'en fichier : aucune requête réseau, donc
      rien à mettre en cache hors-ligne. C'est la barre chargée de l'onglet
      Accueil, à traits épaissis pour rester lisible à 16 px.
      Le jeu d'icônes PWA complet (192/512/maskable) arrive au Lot 9.
    -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0a0b'/%3E%3Cg stroke='%23c7f252' stroke-width='3.2' stroke-linecap='round'%3E%3Cpath d='M11 16h10'/%3E%3Cpath d='M9.5 11v10'/%3E%3Cpath d='M22.5 11v10'/%3E%3C/g%3E%3C/svg%3E"
    />
    <!--
      Le module principal est différé : sans ce script bloquant, un utilisateur en
      thème clair voit un flash noir à chaque démarrage. Doit rester synchrone et
      utiliser la même clé que src/stores/theme.ts.
    -->
    <script>
      (function () {
        var theme = localStorage.getItem('fittrack:theme') === 'light' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', theme);
        document
          .querySelector('meta[name="theme-color"]')
          .setAttribute('content', theme === 'light' ? '#ffffff' : '#0a0a0b');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
